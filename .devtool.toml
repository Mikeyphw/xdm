[project]
# This is a mixed desktop/.NET and Android repository. Android is the root
# project kind; desktop commands select the xdm_modern named target explicitly.
kind = "android" # auto | dotnet | android | gradle | python | command | unknown

[execution]
environment = "auto" # auto | native-termux | chroot | desktop-linux | android-device | external-device
chroot_name = "androidos"
device_serial = ""

[targets.xdm_modern]
type = "dotnet"
solution = "app/XDM/XDM.Modern.sln"
run_project = "app/XDM/src/XDM.App/XDM.App.csproj"

python = ""
run_module = ""
restore_command = "dotnet restore app/XDM/XDM.Modern.sln"
build_command = "dotnet build app/XDM/XDM.Modern.sln --configuration Release --no-restore"
test_command = "dotnet test app/XDM/XDM.Modern.sln --configuration Release --no-build"
run_command = "dotnet run --project app/XDM/src/XDM.App/XDM.App.csproj"
package_command = "bash app/XDM/eng/qualify-prerelease.sh"

[targets.xdm_android]
type = "android"
root = "app/XDM.Android"
execution_environment = "auto"
chroot_name = "androidos"

[targets.xdm_android.android]
variant = "debug"
aapt2_provider = "auto"
instrumentation = "never"
prefer_native_termux = false

[targets.xdm_android.gradle]
version = "9.4.1"
max_workers = 4
structured_events = false
no_daemon = true
fail_fast = true
offline = false

[targets.xdm_android.tasks]
restore = ["help"]
build = ["assembleDebug"]
test = [
  ":core-model:test",
  ":transfer-api:test",
  ":browser-integration:testDebugUnitTest",
  ":storage:testDebugUnitTest",
  ":transfer-native:testDebugUnitTest",
  ":scheduler:testDebugUnitTest",
  ":media:test",
  ":persistence:testDebugUnitTest",
  ":app:testDebugUnitTest",
]
lint = ["lintDebug"]
clean = ["clean"]

[targets.xdm_android.artifacts]
required = true

[env]
DOTNET_CLI_TELEMETRY_OPTOUT = "1"
DOTNET_NOLOGO = "1"

[validation]
android_safe = true
max_workers = 1
cpu_limit = 2
split_gradle = true
no_daemon = true
low_priority = true
parallel = false
gradle_heap_mb = 512
gradle_metaspace_mb = 384
memory_guard_mb = 256
