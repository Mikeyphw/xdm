name: XDM Modern CI

on:
  push:
    branches: [master, main, modern]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
      - name: Restore
        run: dotnet restore app/XDM/XDM.Modern.sln
      - name: Build
        run: dotnet build app/XDM/XDM.Modern.sln -c Release --no-restore
      - name: Test
        run: dotnet test app/XDM/XDM.Modern.sln -c Release --no-build --logger trx --results-directory artifacts/test-results
      - name: Bootstrap smoke test
        run: dotnet run --project app/XDM/src/XDM.App/XDM.App.csproj -c Release --no-build -- --validate-bootstrap
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.os }}
          path: artifacts/test-results
          if-no-files-found: ignore
