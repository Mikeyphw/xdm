name: Android CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - name: Install SDK
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.4.1'
      - name: Bootstrap wrapper when source archive omits the binary jar
        run: test -f gradle/wrapper/gradle-wrapper.jar || gradle wrapper --gradle-version 9.4.1
      - name: Static phase contracts
        run: |
          python3 tools/validate-foundation.py
          python3 tools/validate-phase-2-3.py
          python3 tools/validate-phase-4.py
          python3 tools/validate-phase-5.py
          python3 tools/validate-ownership-hardening.py
          python3 tools/validate-phase-6b.py
          python3 tools/validate-phase-6.py
          python3 tools/validate-phase-7.py
          python3 tools/validate-phase-8.py
          python3 tools/validate-phase-9.py
          python3 tools/validate-phase-10.py
          python3 tools/validate-phase-11.py
          python3 tools/validate-phase-12.py
          python3 tools/validate-phase-13.py
          python3 tools/validate-phase-14.py
          python3 tools/validate-phase-15.py
          python3 tools/validate-phase-16.py
          python3 tools/validate-phase-17.py
      - name: Install official ARM64 aria2 runtime
        run: python3 tools/install-aria2-runtime.py --download-official
      - run: ./gradlew -Pxdm.requireAria2Runtime=true --stacktrace lintDebug lintBeta :transfer-api:test :storage:test :transfer-native:test :transfer-aria2:test :scheduler:test :media:test :persistence:testDebugUnitTest testDebugUnitTest assembleDebug assembleBeta
      - name: Verify packaged aria2 payload
        run: |
          apk="$(find app/build/outputs/apk/beta -maxdepth 1 -type f -name '*.apk' -print -quit)"
          test -n "$apk"
          python3 tools/verify-aria2-runtime.py --require-payload --apk "$apk"
      - name: Final public release gate
        run: tools/run-final-release-gate.sh --ci
