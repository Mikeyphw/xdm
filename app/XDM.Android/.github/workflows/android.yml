name: Android CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - name: Install SDK
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.4.1'
      - name: Bootstrap wrapper when source archive omits the binary jar
        run: test -f gradle/wrapper/gradle-wrapper.jar || gradle wrapper --gradle-version 9.4.1
      - name: Static phase contracts
        run: |
          python3 tools/validate-foundation.py
          python3 tools/validate-phase-2-3.py
          python3 tools/validate-phase-4.py
          python3 tools/validate-phase-5.py
          python3 tools/validate-ownership-hardening.py
          python3 tools/validate-phase-6b.py
          python3 tools/validate-phase-6.py
          python3 tools/validate-phase-7.py
          python3 tools/validate-phase-8.py
          python3 tools/validate-phase-9.py
          python3 tools/validate-phase-10.py
          python3 tools/validate-phase-11.py
          python3 tools/validate-phase-12.py
          python3 tools/validate-phase-13.py
          python3 tools/validate-phase-14.py
          python3 tools/validate-phase-15.py
          python3 tools/validate-phase-16.py
          python3 tools/validate-phase-17.py
          python3 tools/validate-post17-desktop-parity.py
          python3 tools/validate-termux-bridge.py
          python3 tools/validate-termux-media-pipeline.py
          python3 tools/validate-browser-media-downloader.py
          python3 tools/validate-browser-media-continuity.py
          python3 tools/validate-media-resolver-player.py
          python3 tools/validate-media-execution-library.py
          python3 tools/validate-media-download-engine-hardening.py
          python3 tools/validate-media-dispatch-control-tower.py
          python3 tools/validate-media-queue-telemetry.py
          python3 tools/validate-media-queue-actions.py
          python3 tools/validate-media-worker-bridge.py
          python3 tools/validate-media-termux-runtime-adapter.py
          python3 tools/validate-media-native-direct-download-engine.py
          python3 tools/validate-media-offline-library-v2.py
          python3 tools/validate-media-player-diagnostics.py
          python3 tools/validate-media-browser-capture-quality.py
          python3 tools/validate-media-session-privacy-audit.py
          python3 tools/validate-media-mobile-polish.py
          python3 tools/validate-media-final-validation-gate.py
          python3 tools/validate-phase-34-release-handoff.py
          python3 tools/validate-phase-35-release-candidate-polish.py
          python3 tools/validate-phase-36-external-download-handoff.py
      - name: Install official ARM64 aria2 runtime
        run: python3 tools/install-aria2-runtime.py --download-official
      - run: ./gradlew -Pxdm.requireAria2Runtime=true --stacktrace lintDebug lintBeta :transfer-api:test :storage:test :transfer-native:test :transfer-aria2:test :scheduler:test :media:test :persistence:testDebugUnitTest testDebugUnitTest assembleDebug assembleBeta
      - name: Verify packaged aria2 payload
        run: |
          apk="$(find app/build/outputs/apk/beta -maxdepth 1 -type f -name '*.apk' -print -quit)"
          test -n "$apk"
          python3 tools/verify-aria2-runtime.py --require-payload --require-16kb-alignment --apk "$apk"
      - name: Final public release gate
        run: bash tools/run-final-release-gate.sh --ci
      - name: Smoke beta artifact helper
        run: bash -n tools/build-release-artifacts.sh
