<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>XDM Integration</title>
  <link rel="stylesheet" href="styles.css">
  <script src="popup.js" defer></script>
</head>
<body>
  <header>
    <div>
      <strong>XDM Integration</strong>
      <span id="health">Checking native host…</span>
    </div>
    <label class="switch"><input id="enabled" type="checkbox"><span>Capture downloads</span></label>
  </header>
  <main>
    <div class="grid two">
      <label>Minimum size (MB)<input id="minimumSize" type="number" min="0" step="0.1"></label>
      <label class="check"><input id="incognito" type="checkbox"><span>Allow private/incognito</span></label>
    </div>
    <label>Excluded sites<textarea id="excludedSites" placeholder="example.com, *.internal.test"></textarea></label>
    <label>Included sites (empty = all)<textarea id="includedSites"></textarea></label>
    <div class="grid two">
      <label>Blocked MIME types<textarea id="blockedMimeTypes" placeholder="text/html, image/*"></textarea></label>
      <label>Allowed MIME types<textarea id="allowedMimeTypes"></textarea></label>
    </div>
    <div class="grid two">
      <label>Blocked extensions<textarea id="blockedExtensions" placeholder="tmp, crdownload"></textarea></label>
      <label>Allowed extensions<textarea id="allowedExtensions"></textarea></label>
    </div>
    <div class="actions">
      <button id="save" class="primary">Save rules</button>
      <button id="disable">Disable 10 min</button>
      <button id="enableNow">Enable now</button>
    </div>
    <p id="result"></p>
    <p class="extension-id">Extension ID: <code id="extensionId"></code></p>
  </main>
</body>
</html>
