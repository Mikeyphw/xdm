# Recorded XDM 8-compatible migration fixture
default.folder=/tmp/legacy-downloads
max.concurrent.downloads=7
speed.limit.bytes=262144
clipboard.monitor=true
clipboard.auto.add=false
connectTimeout=45
requestTimeout=0
maxRetry=6
retryDelay=800
connections=8
maxConnections=12
minSegmentedSize=2097152
proxy.mode=manual
proxy.host=proxy.example.test
proxy.port=3128
proxy.user=legacy-user
proxy.password=legacy-secret
proxy.bypass.local=true
duplicate.behavior=Skip
create.folder=true
category.video.name=Videos
category.video.extensions=mp4,mkv,webm
category.video.folder=/tmp/legacy-video
queue.night.name=Night queue
queue.night.maxConcurrent=2
queue.night.speedLimitBytesPerSecond=131072
